kind = "web"
previewPath = "/"
title = "AI Trading Bot Dashboard"
version = "1.0.0"
id = "artifacts/trading-bot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20883
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/trading-bot run dev"

[services.env]
PORT = "20883"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/trading-bot", "run", "build"]
publicDir = "artifacts/trading-bot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
